name: Sync Upstream

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: upstream-sync
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/modelcontextprotocol/inspector.git || true
          git remote set-url upstream https://github.com/modelcontextprotocol/inspector.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream
        run: |
          git merge upstream/main --allow-unrelated-histories || {
            echo "Merge completed with potential conflicts"
          }

      - name: Push changes
        run: git push origin upstream-sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
